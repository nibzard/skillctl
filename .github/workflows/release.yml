name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: skillctl
          - os: macos-13
            target: x86_64-apple-darwin
            binary: skillctl
          - os: macos-14
            target: aarch64-apple-darwin
            binary: skillctl
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: skillctl.exe
    steps:
      - uses: actions/checkout@v4
      - name: Validate release ref
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" != "tag" || "${GITHUB_REF_NAME}" != v* ]]; then
            echo "release builds must run from a v* tag" >&2
            exit 1
          fi
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        shell: bash
        run: cargo build --release --locked --target "${{ matrix.target }}"
      - name: Smoke test first run
        shell: bash
        run: |
          home_dir="$RUNNER_TEMP/skillctl-home"
          work_dir="$RUNNER_TEMP/skillctl-work"
          rm -rf "$home_dir" "$work_dir"
          mkdir -p "$home_dir" "$work_dir"
          HOME="$home_dir" bash scripts/release-smoke-test.sh \
            --binary "target/${{ matrix.target }}/release/${{ matrix.binary }}" \
            --home "$home_dir" \
            --workdir "$work_dir"
      - name: Package archive
        shell: bash
        run: |
          mkdir -p dist
          bash scripts/package-release.sh \
            --binary "target/${{ matrix.target }}/release/${{ matrix.binary }}" \
            --version "${GITHUB_REF_NAME}" \
            --target "${{ matrix.target }}" \
            --output dist
      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish release assets
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Validate release ref
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" != "tag" || "${GITHUB_REF_NAME}" != v* ]]; then
            echo "release publish must run from a v* tag" >&2
            exit 1
          fi
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true
      - name: Stage installer and checksums
        run: |
          cp scripts/install.sh dist/skillctl-install.sh
          (
            cd dist
            sha256sum skillctl-v* > "skillctl-${GITHUB_REF_NAME}-checksums.txt"
          )
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
